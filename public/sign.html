<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Sign</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    /* ── Welcome message ─────────────────────────────────── */
    #welcome {
      flex: 0 0 auto;
      width: 100%;
      height: 20vh;
      overflow: hidden;
      padding: 2vh 4vw;
      text-align: center;
      font-size: 10rem; /* overridden by fitWelcome() */
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 1.15;
      text-shadow: 0 2px 24px rgba(255, 255, 255, 0.15);
      word-break: break-word;
      white-space: normal;
    }

    /* ── Main image ──────────────────────────────────────── */
    #image-wrap {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 70vh;
      padding: 1vh 4vw;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    #image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 4px;
    }

    #image-wrap.mode-fit {
      padding: 1vh 4vw;
    }

    #image-wrap.mode-fit img {
      position: static;
      left: auto;
      top: auto;
      object-fit: contain;
      border-radius: 4px;
    }

    #image-wrap.mode-crop {
      padding: 0;
    }

    #image-wrap.mode-crop img {
      position: absolute;
      object-fit: unset;
      border-radius: 0;
      max-width: none;
      max-height: none;
    }

    /* ── Logo ────────────────────────────────────────────── */
    #logo-wrap {
      flex: 0 0 auto;
      width: 100%;
      height: 10vh;
      padding: 1vh 4vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #logo-wrap img {
      max-height: 100%;
      max-width: 30vw;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <div id="welcome">Welcome!</div>

  <div id="image-wrap"></div>

  <div id="logo-wrap"></div>

  <script>
    let currentData = null;

    function hasValidCrop(crop) {
      return crop &&
        Number.isFinite(crop.x) &&
        Number.isFinite(crop.y) &&
        Number.isFinite(crop.width) &&
        Number.isFinite(crop.height) &&
        crop.width > 0 &&
        crop.height > 0;
    }

    function applyImageLayout() {
      if (!currentData) return;

      const imgWrap = document.getElementById('image-wrap');
      const img = imgWrap.querySelector('img');
      if (!img) return;

      const imageMode = (currentData.imageMode === 'crop' || currentData.imageMode === 'stretch') ? 'crop' : 'fit';

      if (imageMode === 'fit') {
        img.style.position = 'static';
        img.style.left = 'auto';
        img.style.top = 'auto';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'contain';
        return;
      }

      const crop = currentData.crop;
      if (!hasValidCrop(crop) || !img.naturalWidth || !img.naturalHeight) {
        // Fallback when there is no saved crop geometry.
        img.style.position = 'static';
        img.style.width = '100%';
        img.style.height = '100%';
        img.style.objectFit = 'cover';
        return;
      }

      const wrapWidth = imgWrap.clientWidth;
      const wrapHeight = imgWrap.clientHeight;
      if (!wrapWidth || !wrapHeight) return;

      const safeWidth = Math.min(crop.width, img.naturalWidth);
      const safeHeight = Math.min(crop.height, img.naturalHeight);
      const safeX = Math.max(0, Math.min(crop.x, img.naturalWidth - safeWidth));
      const safeY = Math.max(0, Math.min(crop.y, img.naturalHeight - safeHeight));

      const scale = Math.max(wrapWidth / safeWidth, wrapHeight / safeHeight);
      const drawWidth = img.naturalWidth * scale;
      const drawHeight = img.naturalHeight * scale;
      const offsetX = -safeX * scale + (wrapWidth - safeWidth * scale) / 2;
      const offsetY = -safeY * scale + (wrapHeight - safeHeight * scale) / 2;

      img.style.position = 'absolute';
      img.style.objectFit = 'unset';
      img.style.width = `${drawWidth}px`;
      img.style.height = `${drawHeight}px`;
      img.style.left = `${offsetX}px`;
      img.style.top = `${offsetY}px`;
    }

    // ── Fit welcome text into ≤25vh ─────────────────────
    function fitWelcome() {
      const el = document.getElementById('welcome');
      const maxH = window.innerHeight * 0.20;
      const maxW = el.clientWidth;
      let size = 200; // start large, px
      el.style.fontSize = size + 'px';
      // Binary-search the largest size that still fits
      let lo = 40, hi = size;
      while (hi - lo > 0.5) {
        const mid = (lo + hi) / 2;
        el.style.fontSize = mid + 'px';
        if (el.scrollHeight <= maxH && el.scrollWidth <= maxW) {
          lo = mid;
        } else {
          hi = mid;
        }
      }
      el.style.fontSize = lo + 'px';
    }

    window.addEventListener('resize', () => {
      fitWelcome();
      applyImageLayout();
    });

    function applyData(data) {
      currentData = data;

      // Message — textContent is XSS-safe
      document.getElementById('welcome').textContent = data.message || 'Welcome!';
      fitWelcome();

      // Main image
      const imgWrap = document.getElementById('image-wrap');
      const imageMode = (data.imageMode === 'crop' || data.imageMode === 'stretch') ? 'crop' : 'fit';
      imgWrap.classList.remove('mode-fit', 'mode-crop');
      imgWrap.classList.add(`mode-${imageMode}`);

      if (data.image) {
        let img = imgWrap.querySelector('img');
        if (!img) {
          img = document.createElement('img');
          img.alt = 'Sign image';
          imgWrap.innerHTML = '';
          imgWrap.appendChild(img);
        }
        if (img.src !== location.origin + data.image) {
          img.src = data.image;
          img.onload = applyImageLayout;
        }
        applyImageLayout();
      } else {
        imgWrap.innerHTML = '';
      }

      // Logo
      const logoWrap = document.getElementById('logo-wrap');
      if (data.logo) {
        let logo = logoWrap.querySelector('img');
        if (!logo) {
          logo = document.createElement('img');
          logo.alt = 'Logo';
          logoWrap.innerHTML = '';
          logoWrap.appendChild(logo);
        }
        if (logo.src !== location.origin + data.logo) {
          logo.src = data.logo;
        }
      } else {
        logoWrap.innerHTML = '';
      }
    }

    // ── Load initial data ─────────────────────────────────
    fetch('/api/data')
      .then(r => r.json())
      .then(applyData)
      .catch(console.error);

    // ── Listen for instant updates via SSE ────────────────
    const evtSource = new EventSource('/api/events');
    evtSource.onmessage = e => {
      try { applyData(JSON.parse(e.data)); } catch (_) {}
    };

    // ── Fallback poll every 30 s if SSE drops ────────────
    setInterval(() => {
      fetch('/api/data')
        .then(r => r.json())
        .then(applyData)
        .catch(console.error);
    }, 30_000);
  </script>
</body>
</html>
