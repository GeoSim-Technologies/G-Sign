<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G-Sign Admin</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      max-width: 700px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span {
      color: #2563eb;
    }

    .view-sign-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: #1a1a2e;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .view-sign-btn:hover { background: #2563eb; }

    /* ── Banner ─────────────────────────────────────────── */
    .banner {
      max-width: 700px;
      margin: 0 auto 20px;
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      color: #065f46;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      display: none;
    }
    .banner.visible { display: block; }

    /* ── Card ────────────────────────────────────────────── */
    .card {
      max-width: 700px;
      margin: 0 auto 20px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 28px 28px 24px;
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6b7280;
      margin-bottom: 16px;
    }

    /* ── Inputs ─────────────────────────────────────────── */
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      color: #1a1a2e;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
    }
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }

    /* ── File upload area ───────────────────────────────── */
    .upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-area:hover,
    .upload-area.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .upload-label {
      font-size: 0.875rem;
      color: #6b7280;
    }
    .upload-label strong { color: #2563eb; }

    /* ── Preview ─────────────────────────────────────────── */
    .preview-wrap {
      margin-top: 14px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .preview-wrap img {
      max-height: 120px;
      max-width: 220px;
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      background: #f9f9f9;
      padding: 4px;
    }

    .preview-meta {
      flex: 1;
    }

    .preview-label {
      font-size: 0.78rem;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .clear-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: #dc2626;
      font-weight: 500;
      cursor: pointer;
    }
    .clear-check input { accent-color: #dc2626; cursor: pointer; }

    /* ── Submit ─────────────────────────────────────────── */
    .submit-wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    button[type="submit"]:hover  { background: #1d4ed8; }
    button[type="submit"]:active { transform: scale(0.98); }

    /* ── No-image placeholder ───────────────────────────── */
    .no-image {
      font-size: 0.825rem;
      color: #9ca3af;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>G-Sign <span>Admin</span></h1>
    <a class="view-sign-btn" href="/sign" target="_blank">&#x1F4FA; View Sign</a>
  </header>

  <div class="banner" id="saved-banner">&#x2713; Changes saved — the sign has been updated.</div>

  <form method="POST" action="/api/update" enctype="multipart/form-data">

    <!-- Welcome Message -->
    <div class="card">
      <div class="card-title">Welcome Message</div>
      <label for="message">Text displayed at the top of the sign</label>
      <textarea id="message" name="message" rows="3" maxlength="200" placeholder="Welcome!"></textarea>
    </div>

    <!-- Main Image -->
    <div class="card">
      <div class="card-title">Main Image</div>
      <div class="upload-area" id="image-drop">
        <div class="upload-icon">&#x1F5BC;</div>
        <div class="upload-label"><strong>Click to upload</strong> or drag &amp; drop</div>
        <div class="upload-label">JPG, PNG, GIF, WebP &mdash; max 10 MB</div>
        <input type="file" name="image" id="image-input" accept="image/*">
      </div>
      <div class="preview-wrap" id="image-preview-wrap" style="display:none">
        <img id="image-preview" src="" alt="Current image">
        <div class="preview-meta">
          <div class="preview-label">Current image</div>
          <label class="clear-check">
            <input type="checkbox" name="clearImage"> Remove image from sign
          </label>
        </div>
      </div>
    </div>

    <!-- Logo -->
    <div class="card">
      <div class="card-title">Logo</div>
      <div class="upload-area" id="logo-drop">
        <div class="upload-icon">&#x2B50;</div>
        <div class="upload-label"><strong>Click to upload</strong> or drag &amp; drop</div>
        <div class="upload-label">JPG, PNG, GIF, WebP, SVG &mdash; max 10 MB</div>
        <input type="file" name="logo" id="logo-input" accept="image/*">
      </div>
      <div class="preview-wrap" id="logo-preview-wrap" style="display:none">
        <img id="logo-preview" src="" alt="Current logo">
        <div class="preview-meta">
          <div class="preview-label">Current logo</div>
          <label class="clear-check">
            <input type="checkbox" name="clearLogo"> Remove logo from sign
          </label>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <div class="submit-wrap">
      <button type="submit">Save &amp; Update Sign</button>
    </div>

  </form>

  <script>
    // ── Show success banner ───────────────────────────────
    if (new URLSearchParams(location.search).get('saved') === '1') {
      document.getElementById('saved-banner').classList.add('visible');
      // Clean the URL without reloading
      history.replaceState(null, '', '/admin');
    }

    // ── Populate form with current data ───────────────────
    fetch('/api/data')
      .then(r => r.json())
      .then(data => {
        // Message
        if (data.message) {
          document.getElementById('message').value = data.message;
        }

        // Image
        if (data.image) {
          document.getElementById('image-preview').src = data.image;
          document.getElementById('image-preview-wrap').style.display = 'flex';
        }

        // Logo
        if (data.logo) {
          document.getElementById('logo-preview').src = data.logo;
          document.getElementById('logo-preview-wrap').style.display = 'flex';
        }
      })
      .catch(console.error);

    // ── Local preview on file select ──────────────────────
    function wireLocalPreview(inputId, previewImgId, previewWrapId) {
      document.getElementById(inputId).addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        document.getElementById(previewImgId).src = url;
        document.getElementById(previewWrapId).style.display = 'flex';
      });
    }

    wireLocalPreview('image-input', 'image-preview', 'image-preview-wrap');
    wireLocalPreview('logo-input',  'logo-preview',  'logo-preview-wrap');

    // ── Drag-and-drop highlight ───────────────────────────
    ['image-drop', 'logo-drop'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('dragover'); });
      el.addEventListener('dragleave', ()  => el.classList.remove('dragover'));
      el.addEventListener('drop',      e => { e.preventDefault(); el.classList.remove('dragover'); });
    });
  </script>
</body>
</html>
